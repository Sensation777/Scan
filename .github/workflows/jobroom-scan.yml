name: One-off Job-Room scan

on:
  workflow_dispatch:
  push:
    paths:
      - 'scan_jobroom.py'
      - '.github/workflows/jobroom-scan.yml'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependency
        run: python -m pip install --disable-pip-version-check requests
      - name: Run Job-Room scanner
        run: python scan_jobroom.py
      - name: Commit results
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add results/
          if git diff --cached --quiet; then
            echo 'No result changes to commit.'
          else
            git commit -m 'Add Job-Room scan results'
            git push
          fi
